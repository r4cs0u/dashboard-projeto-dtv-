*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#2196F3;--orange:#FF9800;--green:#4CAF50;--purple:#9C27B0;--red:#e74c3c;

body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--light);color:#2c3e50;font-size:14px;line-height:1.5}
header{background:var(--dark);color:#fff;padding:18px 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}

.container{max-width:1360px;margin:0 auto;padding:16px}
.search-wrap{margin-bottom:16px;position:relative}
.search-wrap input{width:100%;padding:11px 16px 11px 40px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:#fff;outline:none}
.search-wrap input:focus{border-color:var(--blue)}
.search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--gray)}
.section-title{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--dark);margin:18px 0 10px;padding-left:12px;border-left:4px solid var(--blue)}
.vg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:6px}
@media(max-width:700px){.vg-grid{grid-template-columns:repeat(2,1fr)}}
.vg-card{background:#fff;border-radius:10px;padding:16px 18px;box-shadow:var(--shadow);text-align:center}
.vg-card .vg-label{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--gray);font-weight:600}
.vg-card .vg-val{font-size:30px;font-weight:700;margin:4px 0 0}
.vg-card .vg-sub{font-size:11px;color:var(--gray)}
.st-grid{display:grid;grid-template-columns:1fr 1fr 300px;gap:12px;margin-bottom:6px}
@media(max-width:900px){.st-grid{grid-template-columns:1fr}}
.st-panel{background:#fff;border-radius:10px;padding:16px 18px;box-shadow:var(--shadow)}
.st-panel h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);font-weight:700;margin-bottom:10px}
.bar-row{display:flex;align-items:center;gap:8px;padding:5px 4px;border-radius:4px;cursor:pointer;transition:background .15s}
.bar-row:hover{background:var(--light)}.bar-row.active{background:#e3f0ff}
.bar-label{width:140px;font-size:12px;text-align:right;color:#555;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:16px;background:#eee;border-radius:3px;overflow:hidden;min-width:50px}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}
.bar-val{min-width:36px;font-size:12px;font-weight:600;text-align:right;color:#555}
.gauge-wrap{display:flex;flex-direction:column;align-items:center}
.gauge-counters{display:flex;gap:14px;margin-top:8px;font-size:11px;flex-wrap:wrap;justify-content:center}
.gc{display:flex;align-items:center;gap:4px}.gc-dot{width:8px;height:8px;border-radius:50%}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);overflow-x:auto;background:#fff;border-radius:10px 10px 0 0;box-shadow:var(--shadow);margin-top:16px}
.tab-btn{padding:11px 18px;font-size:13px;font-weight:600;background:none;border:none;cursor:pointer;color:var(--gray);white-space:nowrap;border-bottom:3px solid transparent;transition:all .15s}
.tab-btn:hover{color:var(--dark)}.tab-btn.active{color:var(--dark);border-bottom-color:var(--blue)}
.tab-cnt{display:inline-block;background:var(--light);border-radius:10px;padding:1px 7px;font-size:11px;margin-left:4px}
.tab-btn.active .tab-cnt{background:var(--blue);color:#fff}
.tab-content{display:none;background:#fff;border-radius:0 0 10px 10px;box-shadow:var(--shadow);padding:14px 16px}
.tab-content.active{display:block}
.tf{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.fg{display:flex;align-items:center;gap:3px}
.fg label{font-size:11px;font-weight:700;color:var(--gray);margin-right:3px}
.fb{padding:4px 10px;font-size:11px;border:1px solid var(--border);border-radius:5px;background:#fff;cursor:pointer;transition:all .12s;font-weight:500}
.fb:hover{background:var(--light)}.fb.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.cb{padding:4px 12px;font-size:11px;border:1px solid var(--border);border-radius:5px;background:#fff;cursor:pointer;color:var(--red);font-weight:700;margin-left:auto}
.cb:hover{background:#ffeaea}
.ilist{display:flex;flex-direction:column;gap:5px}
.ic{border:1px solid var(--border);border-radius:7px;overflow:hidden;transition:box-shadow .12s;position:relative}
.ic:hover{box-shadow:0 2px 10px rgba(0,0,0,.06)}
.ih{display:grid;grid-template-columns:minmax(100px,180px) 1fr 110px 140px;gap:8px;padding:10px 14px 10px 18px;align-items:center;cursor:pointer;transition:background .1s}
.ih:hover{background:#fafbfc}
@media(max-width:850px){.ih{grid-template-columns:1fr;gap:5px}}
.ie{font-size:10px;color:var(--gray);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.it{font-size:13px;font-weight:600;color:#2c3e50}
.ib{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.bg{padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.3px}
.bg-c{background:#fde8e8;color:#c0392b}.bg-e{background:#e3f0ff;color:#2471a3}.bg-s{background:#f0f0f0;color:#555}
.pw{display:flex;align-items:center;gap:6px}
.pt{flex:1;height:7px;background:#eee;border-radius:3px;overflow:hidden;min-width:50px}
.pf{height:100%;border-radius:3px}.pp{font-size:12px;font-weight:700;min-width:34px;text-align:right}
.so{font-size:11px;padding:3px 8px;border-radius:4px;text-align:center;font-weight:600;white-space:nowrap;display:inline-block}
.s-res{background:#e8f8f0;color:#1a7a4c}.s-val{background:#e3f0ff;color:#2471a3}
.s-sol{background:#f3e8ff;color:#7b2cbf}.s-con{background:#e8f4f8;color:#1a6b7a}.s-sem{background:#f0f0f0;color:#888}
.ow{font-size:11px;color:var(--gray);text-align:right}
.id{display:none;padding:10px 14px 12px 18px;background:#fafbfc;border-top:1px solid var(--border);font-size:12px;color:#444;line-height:1.6}
.id.open{display:block}
.id b{color:var(--gray);font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.nr{padding:30px;text-align:center;color:var(--gray);font-size:13px}
.gl-bar{width:4px;position:absolute;left:0;top:0;bottom:0;border-radius:2px 0 0 2px}
</style>

{g:"FOUNDATION TECNICO",ep:"Copa do Mundo",t:"Gateway",c:25,cr:"Sim",ev:"Nao",st:"Sem acompanhamento",ow:"HCL",ob:"Primeira entrega feita"}
];

const GR=[
{k:"OPERACAO",l:"Operacao",cl:"#2196F3"},
{k:"PROCESSOS",l:"Processos",cl:"#FF9800"},
{k:"EXPERIENCIA",l:"Experiencia",cl:"#4CAF50"},
{k:"PROGRAMACAO",l:"Programacao",cl:"#9C27B0"},
{k:"FOUNDATION TECNICO",l:"Foundation Tecnico",cl:"#e74c3c"}
];
const TABS=[
{k:"OPERACAO",l:"Operacao"},
{k:"PROCESSOS",l:"Processos"},
{k:"EXPERIENCIA",l:"Experiencia"},
{k:"PROGRAMACAO",l:"Programacao"},
{k:"FOUNDATION TECNICO",l:"Foundation Tecnico"}
];

let fGrp=null,fSt=null,aTab="OPERACAO";
let tF={};
TABS.forEach(t=>tF[t.k]={cr:"Todos",ev:"Todos",done:"Todos"});

function gc(k){return GR.find(g=>g.k===k)?.cl||"#999"}
function pc(v){return v<30?"var(--pr)":v<70?"var(--py)":"var(--pg)"}
function sc(s){
const m={"Resolvido":"s-res","Em validacao":"s-val","Em solucao":"s-sol","Contornado":"s-con","Sem acompanhamento":"s-sem"};
return m[s]||"s-sol";
}

function buildVG(){
const n=D.length,avg=Math.round(D.reduce((a,d)=>a+d.c,0)/n);
const cr=D.filter(d=>d.cr==="Sim").length;
const ev=D.filter(d=>d.ev==="Sim").length;
const ce=D.filter(d=>d.cr==="Sim"&&d.ev==="Sim").length;
document.getElementById("vgArea").innerHTML=[
{l:"Conclusao Geral",v:avg+"%",s:n+" itens rastreados"},
{l:"Criticos Copa",v:cr,s:"de "+n+" itens"},
{l:"Com Evolucao",v:ev,s:"de "+n+" itens"},
{l:"Critico + Evolucao",v:ce,s:""}
].map(c=>'<div class="vg-card"><div class="vg-label">'+c.l+'</div><div class="vg-val">'+c.v+'</div><div class="vg-sub">'+c.s+'</div></div>').join("");
}

function buildGrpBars(){
const el=document.getElementById("grpBars");
el.innerHTML=GR.map(g=>{
const items=D.filter(d=>d.g===g.k);
const avg=Math.round(items.reduce((a,d)=>a+d.c,0)/items.length);
return '<div class="bar-row'+(fGrp===g.k?' active':'')+'" onclick="clickGrp(\''+g.k+'\')">'+
'<span class="bar-label">'+g.l+' ('+items.length+')</span>'+
'<div class="bar-track"><div class="bar-fill" style="width:'+avg+'%;background:'+g.cl+'"></div></div>'+
'<span class="bar-val">'+avg+'%</span></div>';
}).join("");
}

function clickGrp(k){fGrp=fGrp===k?null:k;fSt=null;render()}

function buildStBars(){
const el=document.getElementById("stBars");
const src=fGrp?D.filter(d=>d.g===fGrp):D;
const sts={};src.forEach(d=>{sts[d.st]=(sts[d.st]||0)+1});
const sorted=Object.entries(sts).sort((a,b)=>b[1]-a[1]);
const mx=sorted[0]?sorted[0][1]:1;
const colors={"Resolvido":"#27ae60","Em validacao":"#2471a3","Em solucao":"#7b2cbf","Contornado":"#1a6b7a","Sem acompanhamento":"#999"};
el.innerHTML=sorted.map(([s,cnt])=>{
const pct=(cnt/mx*100);
const col=colors[s]||"#7f8c8d";
return '<div class="bar-row'+(fSt===s?' active':'')+'" onclick="clickSt(\''+s+'\')">'+
'<span class="bar-label">'+s+'</span>'+
'<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+col+'"></div></div>'+
'<span class="bar-val">'+cnt+'</span></div>';
}).join("");
}

function clickSt(s){fSt=fSt===s?null:s;fGrp=null;render()}

function buildGauge(){
const el=document.getElementById("gaugeArea");
let crits=D.filter(d=>d.cr==="Sim");
if(fGrp)crits=crits.filter(d=>d.g===fGrp);
const gap=crits.length?Math.round(crits.reduce((a,d)=>a+(100-d.c),0)/crits.length):0;
const lo=crits.filter(d=>d.c<30).length;
const mid=crits.filter(d=>d.c>=30&&d.c<70).length;
const hi=crits.filter(d=>d.c>=70).length;
const cx=100,cy=100,r=80,nr=62;
const angRad=Math.PI*(1-gap/100);
const nx=cx+nr*Math.cos(angRad);
const ny=cy-nr*Math.sin(angRad);
let label,lc;
if(gap<30){label="Baixa";lc="#27ae60"}
else if(gap<60){label="Moderada";lc="#f39c12"}
else{label="Alta";lc="#e74c3c"}
const grpLabel=fGrp?(" ("+GR.find(g=>g.k===fGrp)?.l+")"):"";
el.innerHTML='<div class="gauge-wrap">'+
'<svg viewBox="0 0 200 125" width="240" height="150">'+
'<path d="M'+(cx-r)+','+cy+' A'+r+','+r+' 0 0,1 '+(cx-r*Math.cos(Math.PI/3))+','+(cy-r*Math.sin(Math.PI/3))+'" fill="none" stroke="#27ae60" stroke-width="16" stroke-linecap="round"/>'+
'<path d="M'+(cx-r*Math.cos(Math.PI/3))+','+(cy-r*Math.sin(Math.PI/3))+' A'+r+','+r+' 0 0,1 '+(cx+r*Math.cos(Math.PI/3))+','+(cy-r*Math.sin(Math.PI/3))+'" fill="none" stroke="#f39c12" stroke-width="16" stroke-linecap="round"/>'+
'<path d="M'+(cx+r*Math.cos(Math.PI/3))+','+(cy-r*Math.sin(Math.PI/3))+' A'+r+','+r+' 0 0,1 '+(cx+r)+','+cy+'" fill="none" stroke="#e74c3c" stroke-width="16" stroke-linecap="round"/>'+
'<line x1="'+cx+'" y1="'+cy+'" x2="'+nx.toFixed(1)+'" y2="'+ny.toFixed(1)+'" stroke="'+lc+'" stroke-width="3" stroke-linecap="round"/>'+
'<circle cx="'+cx+'" cy="'+cy+'" r="6" fill="'+lc+'"/>'+
'<text x="'+cx+'" y="'+(cy-12)+'" text-anchor="middle" font-size="26" font-weight="700" fill="'+lc+'">'+gap+'</text>'+
'<text x="'+cx+'" y="'+(cy+4)+'" text-anchor="middle" font-size="10" font-weight="600" fill="#888">'+label+'</text>'+
'<text x="18" y="'+(cy+18)+'" font-size="9" fill="#27ae60" font-weight="600">Baixa</text>'+
'<text x="'+(cx-16)+'" y="16" font-size="9" fill="#f39c12" font-weight="600">Moderada</text>'+
'<text x="158" y="'+(cy+18)+'" font-size="9" fill="#e74c3c" font-weight="600">Alta</text>'+
'</svg>'+
'<div class="gauge-counters">'+
'<div class="gc"><span class="gc-dot" style="background:#e74c3c"></span>&lt;30%: '+lo+'</div>'+
'<div class="gc"><span class="gc-dot" style="background:#f39c12"></span>30-70%: '+mid+'</div>'+
'<div class="gc"><span class="gc-dot" style="background:#27ae60"></span>&gt;70%: '+hi+'</div>'+
'</div>'+
(fGrp?'<div style="font-size:10px;color:#888;margin-top:4px">Filtrado por'+grpLabel+'</div>':'')+
'</div>';
}

function buildTabs(){
const bar=document.getElementById("tabBar");
bar.innerHTML=TABS.map(t=>{
const cnt=getFiltered(t.k).length;
return '<button class="tab-btn'+(aTab===t.k?' active':'')+'" onclick="swTab(\''+t.k+'\')">'+t.l+'<span class="tab-cnt">'+cnt+'</span></button>';
}).join("");
const c=document.getElementById("tabsC");
c.innerHTML=TABS.map(t=>{
const f=tF[t.k];
return '<div class="tab-content'+(aTab===t.k?' active':'')+'" id="tc_'+t.k+'">'+
'<div class="tf">'+
'<div class="fg"><label>Critico Copa:</label>'+
["Sim","Nao","Todos"].map(v=>'<button class="fb'+(f.cr===v?' active':'')+'" onclick="setF(\''+t.k+"','cr','"+v+"')\">"+v+'</button>').join("")+'</div>'+
'<div class="fg"><label>Evolucao:</label>'+
["Sim","Nao","Todos"].map(v=>'<button class="fb'+(f.ev===v?' active':'')+'" onclick="setF(\''+t.k+"','ev','"+v+"')\">"+v+'</button>').join("")+'</div>'+
'<div class="fg"><label>Concluido:</label>'+
["Sim","Nao","Todos"].map(v=>'<button class="fb'+(f.done===v?' active':'')+'" onclick="setF(\''+t.k+"','done','"+v+"')\">"+v+'</button>').join("")+'</div>'+
'<button class="cb" onclick="clrF(\''+t.k+"')\">Limpar Filtros</button>"+
'</div><div class="ilist" id="il_'+t.k+'"></div></div>';
}).join("");
}

function swTab(k){aTab=k;buildTabs();renderLists()}
function setF(tab,f,v){tF[tab][f]=v;buildTabs();renderLists()}
function clrF(tab){tF[tab]={cr:"Todos",ev:"Todos",done:"Todos"};buildTabs();renderLists()}
function clearAll(){fGrp=null;fSt=null;document.getElementById("gs").value="";TABS.forEach(t=>tF[t.k]={cr:"Todos",ev:"Todos",done:"Todos"});render()}

function getFiltered(gk){
let items=D.filter(d=>d.g===gk);
const s=document.getElementById("gs").value.toLowerCase();
if(s)items=items.filter(d=>(d.t+d.ep+d.ow+d.ob+d.st).toLowerCase().includes(s));
if(fGrp&&fGrp!==gk)return[];
if(fSt)items=items.filter(d=>d.st===fSt);
const f=tF[gk];
if(f.cr!=="Todos")items=items.filter(d=>d.cr===f.cr);
if(f.ev!=="Todos")items=items.filter(d=>d.ev===f.ev);
if(f.done==="Sim")items=items.filter(d=>d.c===100);
if(f.done==="Nao")items=items.filter(d=>d.c<100);
return items;
}

function card(d,idx){
const col=gc(d.g),p=pc(d.c),scl=sc(d.st);
return '<div class="ic"><div class="gl-bar" style="background:'+col+'"></div>'+
'<div class="ih" onclick="tog('+idx+')">'+
'<div><div class="ie">'+d.ep+'</div></div>'+
'<div><div class="it">'+d.t+'</div><div class="ib">'+
(d.cr==="Sim"?'<span class="bg bg-c">CRITICO</span>':'')+
(d.ev==="Sim"?'<span class="bg bg-e">EVOLUCAO</span>':'')+
'<span class="so '+scl+'">'+d.st+'</span></div></div>'+
'<div class="pw"><div class="pt"><div class="pf" style="width:'+d.c+'%;background:'+p+'"></div></div><span class="pp" style="color:'+p+'">'+d.c+'%</span></div>'+
'<div class="ow">'+d.ow+'</div>'+
'</div>'+
'<div class="id" id="dt_'+idx+'"><b>Observacao:</b> '+d.ob+'</div></div>';
}

function tog(i){document.getElementById("dt_"+i).classList.toggle("open")}

function renderLists(){
TABS.forEach(t=>{
const items=getFiltered(t.k);
const el=document.getElementById("il_"+t.k);
if(!el)return;
el.innerHTML=items.length?items.map(d=>card(d,D.indexOf(d))).join(""):'<div class="nr">Nenhum item encontrado com os filtros atuais.</div>';
});
document.querySelectorAll(".tab-btn").forEach(b=>{
TABS.forEach(t=>{
if(b.textContent.includes(t.l)){
const sp=b.querySelector(".tab-cnt");
if(sp)sp.textContent=getFiltered(t.k).length;
}
});
});
}

function render(){buildGrpBars();buildStBars();buildGauge();buildTabs();renderLists()}
buildVG();render();
</script>
</body>
</html>
